<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GitHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;

body{
    background:#050505;
    overflow:hidden;
    height:100vh;
    color:white;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#1d4ed8 0%,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed 0%,transparent 30%),
    #050505;
    opacity:0.8;
    z-index:-1;
}

header{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.logo{
    font-size:64px;
    font-weight:900;
    letter-spacing:4px;
    color:white;
    text-transform:none;
    text-align:center;
    white-space:nowrap;
}
</style>
</head>

<body>

<div class="bg"></div>

<header>
    <div class="logo">Artur Glowacki</div>
</header>

</body>
