<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artur Glowacki</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    width: 100%;
    min-height: 100%;
    background: #ffffff;
    overflow-x: hidden;
}

.page {
    width: 100%;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    background: #ffffff;
}

.page img {
    width: 100%;
    max-width: 1200px;
    height: auto;
    display: block;
}
</style>
</head>

<body>

<div class="page">
    <img src="Lebenslauf_ARG.pdf (10).png" alt="Artur Glowacki">
</div>

</body>
